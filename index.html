<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Animação HTML/CSS</title>
    <style>
        /* Centraliza tudo na tela */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        /* Define o objeto que será animado */
        .circulo {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #ff006e, #8338ec);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(131, 56, 236, 0.6);
            
            /* Chamada da animação: nome, duração, repetição e suavização */
            animation: pulsar 2s infinite ease-in-out;
        }
        /* O "Roteiro" da animação */
        /* O "Roteiro" da animação */
        @keyframes pulsar {
            0% {
                transform: scale(1);
                filter: brightness(1);
            }
            50% {
                transform: scale(1.5); /* Aumenta 50% */
                filter: brightness(1.3); /* Brilha mais */
                box-shadow: 0 0 50px rgba(255, 0, 110, 0.8);
            }
            100% {
                transform: scale(1);
                filter: brightness(1);
            }
        }
    </style>
</head>
<body>
  
  
    <div class="circulo"></div>

</body>
</html>
